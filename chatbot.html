<!DOCTYPE html>
<html>
<head>
<title>Karthik AI Chatbot</title>

<style>
body{
font-family: Arial;
background: linear-gradient(120deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.chatbox{
width:350px;
background:white;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
overflow:hidden;
}

.header{
background:#764ba2;
color:white;
padding:15px;
text-align:center;
font-weight:bold;
}

.messages{
height:300px;
padding:10px;
overflow-y:auto;
font-size:14px;
}

.user{
text-align:right;
margin:5px;
}

.bot{
text-align:left;
margin:5px;
color:#444;
}

.inputbox{
display:flex;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:10px;
border:none;
outline:none;
}

button{
background:#764ba2;
color:white;
border:none;
padding:10px 15px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="chatbox">

<div class="header">
Karthik AI Assistant 🤖
</div>

<div class="messages" id="messages"></div>

<div class="inputbox">
<input id="input" placeholder="Ask something...">
<button onclick="send()">Send</button>
</div>

</div>

<script>

function send(){

let input=document.getElementById("input").value;
let messages=document.getElementById("messages");

messages.innerHTML+=`<div class="user">${input}</div>`;

let reply="I don't understand.";

input=input.toLowerCase();

if(input.includes("hello") || input.includes("hi"))
reply="Hello! I'm Karthik's chatbot.";

else if(input.includes("skills"))
reply="Karthik knows Python, HTML, CSS, JavaScript and GitHub.";

else if(input.includes("certificate"))
reply="Karthik completed AICTE internship and web development courses.";

else if(input.includes("email") || input.includes("contact"))
reply="You can contact Karthik at: ykarthik485@gmail.com";

else if(input.includes("who are you"))
reply="I'm a chatbot created for Karthik's portfolio.";

messages.innerHTML+=`<div class="bot">${reply}</div>`;

document.getElementById("input").value="";

messages.scrollTop=messages.scrollHeight;

}

</script>

</body>
</html>
